aid: wingstop
name: Wingstop
description: >-
  Wingstop Inc. (NASDAQ: WING) is a US-based quick-service restaurant chain
  specializing in cooked-to-order chicken wings, tenders, and sides across
  thousands of franchised and company-owned locations. Wingstop is digital-first
  - digital transactions account for the large majority of systemwide sales -
  built on its proprietary MyWingstop ordering platform and the Club Wingstop
  loyalty program, with consumer ordering via wingstop.com, native iOS and
  Android apps, and third-party delivery marketplaces (DoorDash, Uber Eats,
  Grubhub). Wingstop does not operate a public developer program or publish open
  API documentation. There is no developer.wingstop.com (the host does not
  resolve), and ordering, loyalty, menu, and POS integrations flow through
  bilateral corporate and franchisee technology programs rather than open
  developer endpoints.
