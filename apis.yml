apis:
  - aid: wingstop:wingstop-api
    name: Wingstop API
    description: >-
      Wingstop does not expose a public, self-service API. Ordering, delivery
      integration, menu data, loyalty, and restaurant information flow through
      bilateral partner integrations rather than open developer endpoints. The
      developer.wingstop.com host does not resolve to public documentation
      (NXDOMAIN as of the profiling date), and there is no published API
      reference. Any API access is negotiated per partnership with delivery
      marketplaces, payment processors, loyalty integrators, and franchisee
      technology vendors.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.wingstop.com
    tags:
      - Restaurants
