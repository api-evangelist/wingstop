    properties:
      - type: x-status
        url: https://www.wingstop.com
        x-note: No public developer portal or open API documentation as of 2026-06.
features:
  - name: No Public Developer Program
    description: >-
      Wingstop publishes no open API documentation and offers no self-service
      developer signup. Integration is bilateral and partner-gated through
      corporate IT or franchisee technology programs.
  - name: MyWingstop Digital Ordering
    description: >-
      Proprietary digital ordering platform powering cooked-to-order online
      ordering across web and native mobile apps, with digital making up the
      large majority of systemwide sales.
  - name: Club Wingstop Loyalty
    description: >-
      Points-based loyalty program earning rewards on spend, with exclusive
      flavor access, merchandise drops, and experiential perks.
  - name: Delivery And Carryout
    description: >-
      First-party and third-party delivery plus in-store carryout across the US
      restaurant footprint.
useCases:
  - name: Consumer Mobile Ordering
    description: >-
      Guests place and customize orders, track status, and pay through the
      Wingstop web and mobile experiences.
  - name: Rewards Engagement
    description: >-
      Members accrue and redeem Club Wingstop points and access members-only
      offers and experiences.
  - name: Delivery Marketplace Listing
    description: >-
      Surfacing Wingstop menus, pricing, and fulfillment to consumers via
      DoorDash, Uber Eats, and Grubhub through bilateral marketplace
      integrations.
  - name: Franchisee Restaurant Technology
    description: >-
      POS, kitchen, and back-of-house systems integrated per franchisee under
      Wingstop technology standards rather than a public API.
integrations:
  - name: DoorDash
    description: Delivery marketplace integration for on-demand fulfillment.
  - name: Uber Eats
    description: Delivery marketplace integration for on-demand fulfillment.
  - name: Grubhub
    description: Delivery marketplace integration for on-demand fulfillment.
