description: FinOps shape for Wingstop is partner-contract-driven - no public per-call price exists. Cost lines for an integrating party are commission / fee structures negotiated with corporate or third-party delivery (3PD) partners.
sources:
  - https://www.wingstop.com
notes: No public pricing or billing surface. Populate meters once a corporate / franchisee / 3PD integration agreement is in place.
billingModel:
  pricingCategory: Partner-Negotiated
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
focusColumns:
  ServiceName: Wingstop Integrations
  ServiceCategory: Restaurants
  ProviderName: Wingstop
  PublisherName: Wingstop Restaurants Inc.
  InvoiceIssuerName: Wingstop Restaurants Inc.
  BillingCurrency: USD
meters:
  - name: orders_processed
    unit: order
    aggregation: sum
    dimensions:
      - channel
      - location
  - name: integration_partner_fees
    unit: varies
    aggregation: sum
    dimensions:
      - partner_program
principles:
  - name: Visibility
    description: Reconcile against POS / 3PD partner reports and corporate franchisee dashboards; there is no public Wingstop billing API.
  - name: Allocation
    description: Allocate by channel (web, app, 3PD partner) and store / location, matching how franchise reporting is structured.
  - name: Optimization
    description: Levers are commercial - 3PD commission negotiation, channel mix, and reducing failed-order retries.
  - name: Accountability
    description: Owned by the franchisee / corporate operations team; technical integrators own reliability, not unit cost.
maintainers:
